version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: AuthServiceRestauran_postgres
    restart: always
    environment:
      POSTGRES_DB: AuthService_Restaurantes
      POSTGRES_USER: root
      POSTGRES_PASSWORD: admin
    ports:
      - "5441:5432"
    volumes:
      - postgres_data:/var/lib/postgressql/data 

volumes:
  postgres_data: